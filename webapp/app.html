<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблицы и матчи</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <h1>FC Mobile Tournament</h1>
        <div id="info"></div>
        <div class="tabs">
            <button class="tab active" onclick="showTab('standings')">Таблицы</button>
            <button class="tab" onclick="showTab('my')">Мои матчи</button>
            <button class="tab" onclick="showTab('remaining')">Осталось</button>
        </div>
        <div id="tab-standings" class="tab-content"></div>
        <div id="tab-my" class="tab-content" style="display:none"></div>
        <div id="tab-remaining" class="tab-content" style="display:none"></div>
        <div id="result-form" style="display:none">
            <h3>Результат матча</h3>
            <input type="hidden" id="matchId">
            <div id="res-players"></div>
            <label>Мой счет:</label>
            <input type="number" id="myScore" min="0" required>
            <label>Счет соперника:</label>
            <input type="number" id="oppScore" min="0" required>
            <button onclick="submitMatchResult()">Сохранить</button>
            <button onclick="cancelResult()">Отмена</button>
        </div>
    </div>
    <script src="static/app.js"></script>
    <script>
        Telegram.WebApp.ready(); Telegram.WebApp.expand();
        loadApp();
    </script>
</body>
</html>
